services:

  backend:
    build: ./backend
    container_name: tracker-backend
    restart: unless-stopped
    volumes:
      - tracker-data:/data        # SQLite database persists here
    expose:
      - "3001"                    # Internal only — not exposed to host
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: tracker-frontend
    restart: unless-stopped
    ports:
      - "80:80"                   # Access at http://<your-ip>
    depends_on:
      backend:
        condition: service_healthy

volumes:
  tracker-data:
    name: business-tracker-data   # Named volume — survives container rebuilds
